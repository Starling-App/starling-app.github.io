<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starling Apps</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg:
        radial-gradient(circle at top left, rgba(125, 225, 255, 0.36), transparent 32%),
        radial-gradient(circle at top right, rgba(255, 195, 140, 0.28), transparent 24%),
        radial-gradient(circle at 80% 70%, rgba(121, 140, 255, 0.12), transparent 26%),
        linear-gradient(180deg, #f8fbff 0%, #edf4ff 52%, #f8fbff 100%);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --panel-border: rgba(78, 109, 224, 0.14);
      --text-main: #14203a;
      --text-subtle: #5f6f8e;
      --text-soft: #7b88a3;
      --accent: #4263eb;
      --accent-soft: rgba(66, 99, 235, 0.12);
      --shadow: 0 26px 70px rgba(74, 97, 152, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 24px 48px;
      font-family: "Avenir Next", "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--page-bg);
      color: var(--text-main);
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 30px;
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.84), rgba(255, 255, 255, 0.66));
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -40px -70px auto;
      width: 240px;
      height: 240px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(104, 226, 205, 0.22), transparent 70%);
      pointer-events: none;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: clamp(3rem, 7vw, 5.4rem);
      line-height: 0.96;
      letter-spacing: -0.055em;
    }

    .section-header {
      margin: 38px 0 18px;
    }

    .section-header h2 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: -0.04em;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 28px;
      margin-bottom: 30px;
    }

    .featured-link {
      display: block;
      text-decoration: none;
    }

    .featured-card {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 24px;
      align-items: center;
      padding: 28px;
      border-radius: 32px;
      background: var(--panel-strong);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .featured-link:hover .featured-card,
    .featured-link:focus-visible .featured-card {
      transform: translateY(-5px);
      box-shadow: 0 30px 80px rgba(59, 82, 139, 0.22);
      border-color: rgba(80, 116, 255, 0.3);
    }

    .app-icon {
      width: 108px;
      height: 108px;
      border-radius: 28px;
      object-fit: cover;
      box-shadow: 0 18px 38px rgba(52, 75, 127, 0.2);
    }

    .card-header {
      display: block;
    }

    .card-header h3 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      letter-spacing: -0.04em;
    }

    .app-description {
      margin: 10px 0 0;
      max-width: 620px;
      color: var(--text-subtle);
      line-height: 1.65;
      font-size: 1.02rem;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(20, 32, 58, 0.05);
      color: var(--text-main);
      font-size: 0.92rem;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .featured-card {
        grid-template-columns: minmax(0, 1fr);
      }

      .app-icon {
        width: 88px;
        height: 88px;
        border-radius: 24px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 22px 16px 36px;
      }

      .hero,
      .featured-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-copy">
        <h1>Starling Apps</h1>
      </div>
    </section>

    <section aria-labelledby="featured-apps-title">
      <div class="section-header">
        <h2 id="featured-apps-title">Featured Apps</h2>
      </div>

      <div class="featured-grid" aria-label="App list">
        <a class="featured-link" href="./Starling/">
          <article class="featured-card">
            <img class="app-icon" src="./AppEntries/Starling.png" alt="Starling app icon">
            <div class="app-meta">
              <div class="card-header">
                <h3>Starling Calculator</h3>
              </div>
              <p class="app-description">A powerful bilingual voice calculator that understands you instantly.</p>
              <div class="chip-row" aria-label="App details">
                <span class="chip">iPhone</span>
                <span class="chip">iOS 18+</span>
                <span class="chip">Voice Input</span>
              </div>
            </div>
          </article>
        </a>

        <a class="featured-link" href="./Aira/">
          <article class="featured-card">
            <img class="app-icon" src="./AppEntries/Aira.png" alt="Aira app icon">
            <div class="app-meta">
              <div class="card-header">
                <h3>Aira</h3>
              </div>
              <p class="app-description">A breathing and mindfulness app built to help you slow down, settle your rhythm, and return to calm.</p>
              <div class="chip-row" aria-label="App details">
                <span class="chip">iPhone</span>
                <span class="chip">Breathing</span>
                <span class="chip">Mindfulness</span>
              </div>
            </div>
          </article>
        </a>
      </div>
    </section>

  </main>
</body>
</html>
