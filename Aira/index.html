<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evenhale</title>
  <style>
    :root {
      color-scheme: dark;
      --page-bg:
        radial-gradient(circle at top left, rgba(89, 116, 220, 0.26), transparent 32%),
        radial-gradient(circle at bottom right, rgba(151, 183, 255, 0.18), transparent 30%),
        linear-gradient(180deg, #071026 0%, #0a122d 54%, #09101f 100%);
      --card-bg: rgba(14, 23, 49, 0.8);
      --card-border: rgba(138, 169, 255, 0.16);
      --text-main: #f3f6ff;
      --text-subtle: #a6b2d3;
      --accent: #9cb8ff;
      --shadow: 0 34px 80px rgba(3, 8, 22, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px 18px 44px;
      font-family: "Avenir Next", "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--page-bg);
      color: var(--text-main);
    }

    .page {
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .lang-switch {
      display: inline-flex;
      gap: 8px;
    }

    .lang-button {
      border: 1px solid var(--card-border);
      background: rgba(243, 246, 255, 0.08);
      color: var(--text-main);
      border-radius: 999px;
      min-height: 34px;
      padding: 0 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .lang-button.active {
      background: rgba(156, 184, 255, 0.28);
      border-color: rgba(156, 184, 255, 0.52);
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2.3rem, 5vw, 4rem);
      letter-spacing: -0.04em;
    }

    .intro {
      margin: 12px 0 0;
      max-width: 560px;
      color: var(--text-subtle);
      line-height: 1.65;
      font-size: 1rem;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(243, 246, 255, 0.08);
      color: var(--text-main);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 20px 0 28px;
    }

    .link-row a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .link-row a:hover,
    .link-row a:focus-visible {
      text-decoration: underline;
    }

    .carousel-wrap {
      width: 328px;
      max-width: calc(100vw - 36px);
      margin: 0 auto;
    }

    .carousel {
      position: relative;
      overflow: hidden;
      width: 100%;
      margin: 0;
      border-radius: 30px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .slides {
      display: flex;
      transition: transform 420ms ease;
    }

    .slide {
      flex: 0 0 100%;
      min-width: 100%;
      margin: 0;
      padding: 0;
    }

    .slide img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .controls {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      min-height: 46px;
    }

    .nav-button {
      position: absolute;
      top: 0;
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 999px;
      background: rgba(8, 12, 28, 0.82);
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      transition: background 180ms ease, transform 180ms ease;
    }

    .nav-button:hover,
    .nav-button:focus-visible {
      background: rgba(8, 12, 28, 0.95);
      transform: scale(1.04);
    }

    .nav-prev {
      left: 0;
    }

    .nav-next {
      right: 0;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 56px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border: 0;
      padding: 0;
      border-radius: 999px;
      background: rgba(156, 184, 255, 0.24);
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.2);
    }

    @media (max-width: 640px) {
      .nav-button {
        width: 40px;
        height: 40px;
      }

      .nav-prev {
        left: 10px;
      }

      .nav-next {
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top-row">
      <a class="back-link" href="../" data-i18n data-en="‹ All Apps" data-zh="‹ 所有应用">‹ All Apps</a>
      <div class="lang-switch" aria-label="Language switch">
        <button class="lang-button" type="button" data-lang="en">EN</button>
        <button class="lang-button" type="button" data-lang="zh">中文</button>
      </div>
    </div>

    <header class="header">
      <h1 data-i18n data-en="Evenhale" data-zh="一息">Evenhale</h1>
      <p class="intro" data-i18n data-en="A calm breathing companion designed to help you settle in, follow your rhythm, and find a softer pace." data-zh="一款平静的呼吸陪伴应用，帮助你安定下来，跟随自己的节奏，找到更柔和的呼吸步调。">A calm breathing companion designed to help you settle in, follow your rhythm, and find a softer pace.</p>
      <div class="chip-row" aria-label="App details">
        <span class="chip">iPhone</span>
        <span class="chip">iOS 18+</span>
        <span class="chip">Apple Watch</span>
        <span class="chip" data-i18n data-en="Breathing" data-zh="呼吸">Breathing</span>
        <span class="chip" data-i18n data-en="Mindfulness" data-zh="正念">Mindfulness</span>
      </div>
      <nav class="link-row" aria-label="Evenhale links">
        <a href="https://apps.apple.com/app/id6762370706" target="_blank" rel="noreferrer">App Store</a>
        <a href="./privacy.html" data-i18n data-en="Privacy" data-zh="隐私政策">Privacy</a>
        <a href="./terms.html" data-i18n data-en="Terms of Use" data-zh="使用条款">Terms of Use</a>
      </nav>
    </header>

    <section class="carousel-wrap" aria-label="Evenhale app screenshot carousel">
      <div class="carousel">
        <div class="slides" id="slides">
          <figure class="slide">
            <img src="./01_Premium_EN.png" alt="Evenhale screenshot 1">
          </figure>
          <figure class="slide">
            <img src="./02_Premium_EN.png" alt="Evenhale screenshot 2">
          </figure>
          <figure class="slide">
            <img src="./03_Premium_EN.png" alt="Evenhale screenshot 3">
          </figure>
          <figure class="slide">
            <img src="./04_Premium_EN.png" alt="Evenhale screenshot 4">
          </figure>
          <figure class="slide">
            <img src="./05_Premium_EN.png" alt="Evenhale screenshot 5">
          </figure>
        </div>
      </div>

      <div class="controls">
        <button class="nav-button nav-prev" type="button" aria-label="Previous screenshot">‹</button>
        <div class="dots" id="dots" aria-label="Select screenshot"></div>
        <button class="nav-button nav-next" type="button" aria-label="Next screenshot">›</button>
      </div>
    </section>
  </main>

  <script>
    const languageButtons = Array.from(document.querySelectorAll(".lang-button"));
    const translatableElements = Array.from(document.querySelectorAll("[data-i18n]"));
    const savedLanguage = window.localStorage.getItem("evenhale-language");
    const defaultLanguage = savedLanguage === "zh" ? "zh" : "en";

    function applyLanguage(language) {
      document.documentElement.lang = language === "zh" ? "zh-CN" : "en";
      translatableElements.forEach((element) => {
        const text = element.dataset[language];
        if (text) {
          element.textContent = text;
        }
      });
      languageButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === language);
      });
      window.localStorage.setItem("evenhale-language", language);
    }

    languageButtons.forEach((button) => {
      button.addEventListener("click", () => {
        applyLanguage(button.dataset.lang === "zh" ? "zh" : "en");
      });
    });

    applyLanguage(defaultLanguage);

    const slides = document.getElementById("slides");
    const dotsContainer = document.getElementById("dots");
    const prevButton = document.querySelector(".nav-prev");
    const nextButton = document.querySelector(".nav-next");
    const totalSlides = slides.children.length;
    const autoPlayDelay = 3200;
    let currentIndex = 0;
    let autoPlayTimer = null;

    function renderDots() {
      dotsContainer.innerHTML = "";
      for (let index = 0; index < totalSlides; index += 1) {
        const dot = document.createElement("button");
        dot.type = "button";
        dot.className = `dot${index === currentIndex ? " active" : ""}`;
        dot.setAttribute("aria-label", `Go to screenshot ${index + 1}`);
        dot.addEventListener("click", () => {
          currentIndex = index;
          updateCarousel();
        });
        dotsContainer.appendChild(dot);
      }
    }

    function updateCarousel() {
      slides.style.transform = `translateX(-${currentIndex * 100}%)`;
      renderDots();
    }

    function restartAutoPlay() {
      if (autoPlayTimer) {
        window.clearInterval(autoPlayTimer);
      }
      autoPlayTimer = window.setInterval(() => {
        currentIndex = (currentIndex + 1) % totalSlides;
        updateCarousel();
      }, autoPlayDelay);
    }

    prevButton.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
      updateCarousel();
      restartAutoPlay();
    });

    nextButton.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % totalSlides;
      updateCarousel();
      restartAutoPlay();
    });

    updateCarousel();
    restartAutoPlay();
  </script>
</body>
</html>
